spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/teachers_db
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081

jwt:
  secret: polyparrotpolyparrotpolyparrotpolyparrot

booking-service:
  url: http://localhost:8082

user-service:
  url: http://localhost:8080

internal:
  secret: ${INTERNAL_SECRET:polyparrot-internal-dev-2026}