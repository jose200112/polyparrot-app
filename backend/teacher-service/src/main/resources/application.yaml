spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/teachers_db
    username: ${DB_USER:admin}
    password: ${DB_PASS:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:polyparrotpolyparrotpolyparrotpolyparrot}

booking-service:
  url: http://${BOOKING_SERVICE_HOST:localhost}:8082

user-service:
  url: http://${USER_SERVICE_HOST:localhost}:8080

internal:
  secret: ${INTERNAL_SECRET:polyparrot-internal-dev-2026}