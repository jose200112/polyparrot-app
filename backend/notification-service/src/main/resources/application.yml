spring:
  data:
    mongodb:
      uri: mongodb://${MONGO_USER:admin}:${MONGO_PASS:secret}@${MONGO_HOST:localhost}:27017/notifications_db?authSource=admin
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

server:
  port: 8083

jwt:
  secret: ${JWT_SECRET:polyparrotpolyparrotpolyparrotpolyparrot}

internal:
  secret: ${INTERNAL_SECRET:polyparrot-internal-dev-2026}