<div class="profile-container">

  <div class="profile-header">
    <h2>Mi perfil</h2>
    <p>Gestiona tu información personal</p>
  </div>

  <div class="profile-card">
    <h3>Datos personales</h3>

    <div class="form-grid">
      <div class="field-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="userData.name" maxlength="50" />
        <p class="field-error" *ngIf="userErrors['name']">{{ userErrors['name'] }}</p>
      </div>
      <div class="field-group">
        <label>Primer apellido</label>
        <input type="text" [(ngModel)]="userData.firstSurname" maxlength="50" />
        <p class="field-error" *ngIf="userErrors['firstSurname']">{{ userErrors['firstSurname'] }}</p>
      </div>
      <div class="field-group">
        <label>Segundo apellido <span class="optional">(opcional)</span></label>
        <input type="text" [(ngModel)]="userData.secondSurname" maxlength="50" />
      </div>
    </div>

    <div class="card-footer">
      <p class="success-msg" *ngIf="userSuccess">✅ Datos guardados correctamente</p>
      <p class="field-error" *ngIf="userErrors['general']">{{ userErrors['general'] }}</p>
      <button class="btn-save" (click)="saveUserData()" [disabled]="userLoading">
        {{ userLoading ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>
  </div>

</div>
