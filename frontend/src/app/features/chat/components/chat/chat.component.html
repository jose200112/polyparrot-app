<div class="chat-container">

<div class="chat-header">
  <button class="back-btn" *ngIf="showBackButton" (click)="backClicked.emit()">‹</button>
  <div class="chat-avatar">{{ receiverName.charAt(0) }}</div>
  <div class="chat-info">
    <span class="chat-name">{{ receiverName }}</span>
<span class="chat-status" [class.online]="isReceiverOnline">
  {{ isReceiverOnline ? 'Conectado' : 'Desconectado' }}
</span>
  </div>
</div>

  <div class="messages-container" #messagesContainer>

    <div class="empty-chat" *ngIf="messages.length === 0">
      <p>No hay mensajes aún. ¡Empieza la conversación!</p>
    </div>

<div
  *ngFor="let msg of messages"
  class="message-wrapper"
  [class.own]="isOwn(msg)"
  [class.other]="!isOwn(msg)">

  <div class="message-bubble">
    <p class="message-content">{{ msg.content }}</p>
<div class="message-footer">
  <span class="message-time">{{ msg.sentAt | date:'HH:mm' }}</span>
  <span *ngIf="isOwn(msg)" class="read-tick" [class.read]="msg.read">
    <svg *ngIf="!msg.read" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 11" width="16" height="11">
      <path d="M1 5.5L5.5 10L15 1" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg *ngIf="msg.read" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 11" width="20" height="11">
      <path d="M1 5.5L5.5 10L15 1" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 5.5L9.5 10L19 1" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</div>
  </div>

</div>

  </div>

  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="newMessage"
      placeholder="Escribe un mensaje..."
      (keydown.enter)="sendMessage()"
      [disabled]="!connected"
    />
    <button (click)="sendMessage()" [disabled]="!connected || !newMessage.trim()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="20" height="20">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>
